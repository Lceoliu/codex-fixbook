name: Submission triage

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  acknowledge:
    if: >-
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'submission')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'Thanks for the Codex Fixbook submission.',
              '',
              'V1 records this issue for maintainer triage. The future pipeline will parse this form, check duplicates, and open a YAML PR automatically.',
              '',
              `Issue: #${context.issue.number}`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
